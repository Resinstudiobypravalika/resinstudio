<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resin Studio by Pravalika</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <button id="topBtn" title="Go to top">⬆️</button>

  <div id="loader-wrapper">
    <div id="loader"></div>
  </div>  
  <header>
    <h1>Resin Studio by Pravalika</h1>
    <nav>
      <a href="#gallery">Gallery</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h2>Handcrafted Resin Art</h2>
      <p>Minimal. Elegant. One-of-a-kind.</p>
    </section>

    <section id="gallery">
      <h3>Gallery</h3>
      <div class="grid">
        <div class="gallery-item">
          <img src="assets/art1.jpg" alt="Resin artwork 1" />
        </div>
        <div class="gallery-item">
          <img src="assets/art2.jpg" alt="Resin artwork 2" />
        </div>
        <div class="gallery-item">
          <img src="assets/art2.1.jpg" alt="Resin artwork 2.1" />
        </div>
        <div class="gallery-item">
          <img src="assets/art3.jpg" alt="Resin artwork 3" />
        </div>
        <!-- Add more gallery items below as needed -->
      </div>
    </section>
    

    <section id="contact">
      <h3>Contact</h3>
      <p>Have questions or custom requests? Reach out!</p>
      
      <form id="contact-form">
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Your Email" required />
        <textarea placeholder="Your Message" rows="4" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section> 
    
    <section id="order">
      <h2>Place an Order</h2>
      <form id="orderForm">
        <input type="text" id="name" placeholder="Your Name" required />
        <input type="email" id="email" placeholder="Your Email" required />
        <input type="text" id="product" placeholder="Product Name / Custom Request" required />
        <input type="number" id="amount" placeholder="Amount (in INR)" required />
        <button type="submit">Pay with Razorpay</button>
      </form>
    </section>

    <nav>
      <a href="#gallery">Gallery</a>
      <a href="#contact">Contact</a>
      <a href="#order">Order</a> <!-- 👈 This one -->
    </nav>
    
    <p style="color: red; text-align: center;">Test: This is a temporary message.</p>

  </main>  

  <footer>
    <p>© 2025 Resin Studio by Pravalika</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
